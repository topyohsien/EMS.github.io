<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠島台東·冒險指南(氣象版)</title>
    <style>
        :root { --main: #0077b6; --bg: #f4f7f6; --accent: #ff6b6b; --fishing: #fb8500; --green: #2d6a4f; --sun: #f9c74f; --weather: #48cae4; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; line-height: 1.5; }
        
        /* 氣象預警區塊 */
        .weather-banner { background: white; border-top: 5px solid var(--weather); padding: 12px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .weather-title { font-weight: bold; color: var(--main); font-size: 0.95rem; margin-bottom: 8px; display: block; }
        .weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
        .weather-item { background: #e0f2f1; padding: 8px; border-radius: 6px; border-left: 3px solid var(--weather); }

        .day-tab { background: white; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .day-header { padding: 15px; background: var(--main); color: white; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; }
        .day-content { display: none; padding: 15px; background: white; }
        .day-content.active { display: block; }
        
        .sun-box { background: #fff9e6; border: 1px solid var(--sun); padding: 8px; border-radius: 6px; margin-bottom: 10px; font-size: 13px; display: flex; justify-content: space-around; }
        .nav-box { background: #f0f4f8; border-left: 5px solid var(--main); padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .nav-item { display: block; color: #1a73e8; text-decoration: none; font-size: 14px; margin: 8px 0; font-weight: bold; }
        .fishing-box { background: #fff3e0; border: 1px solid var(--fishing); padding: 10px; border-radius: 8px; margin: 10px 0; }
        .fishing-title { color: var(--fishing); font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; display: block; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #fff; border: 1px solid #ddd; padding: 8px; border-radius: 8px; font-size: 13px; text-align: center; color: #444; text-decoration: none; display: block; }
        .alert { color: var(--accent); font-size: 12px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<h3 style="text-align:center; color: var(--main);">🎣 綠島台東 5/1 - 5/4 冒險指令</h3>

<div class="weather-banner">
    <span class="weather-title">📡 901/903 氣象海象即時預警 (5/1 - 5/4)</span>
    <div class="weather-grid">
        <div class="weather-item">
