<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>綠島台東·冒險指令</title>
    <style>
        :root { --main: #0077b6; --warn: #ff6b6b; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .train-status { background: #eee; padding: 8px; border-radius: 6px; font-size: 13px; margin: 10px 0; }
        .weather-tag { display: inline-block; background: #caf0f8; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .alert { color: var(--warn); font-weight: bold; font-size: 13px; }
        .location { font-size: 1.1rem; color: var(--main); font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <div class="location">5/1 高雄 ➔ 綠島 (首日出征)</div>
        <div class="train-status" id="train-501">🚆 411次 自強(3000) | 07:40 抵達台東</div>
        <div class="train-status">🚢 綠星2號 | 09:00 富岡漁港開車</div>
        <p class="alert">⚠️ 銜接僅 80 分鐘，火車一到站請立即跳上計程車！</p>
        <div id="weather-501" class="weather-tag">正在載入氣象署 091 資料...</div>
    </div>

    <div class="card">
        <div class="location">5/3 綠島 ➔ 台東 (返航)</div>
        <div class="train-status">🚢 天王星21 | 16:30 綠島 ➔ 17:30 富岡</div>
        <div id="weather-503" class="weather-tag">載入 093 預報中...</div>
        <ul style="font-size: 13px;">
            <li>入住：台東市區 (風小院)。</li>
            <li>回程海上湧浪大，建議開船前 30 分鐘服藥。</li>
        </ul>
    </div>

    <div class="card">
        <div class="location">5/4 台東 ➔ 高雄 (賦歸)</div>
        <div class="train-status" id="train-504">🚆 168次 自強(3000) | 16:00 台東發車</div>
        <div id="weather-504" class="weather-tag">氣候分析中...</div>
    </div>

    <script>
        // TDX 憑證 (請填入你的)
        const TDX_CLIENT_ID = 'YOUR_CLIENT_ID';
        const TDX_CLIENT_SECRET = 'YOUR_CLIENT_SECRET';

        // 這是 TDX 獲取 Token 的固定格式
        async function getTDXToken() {
            const res = await fetch('https://tdx.transportdata.tw/auth/realms/TDXConnect/protocol/openid-connect/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `grant_type=client_credentials&client_id=${TDX_CLIENT_ID}&client_secret=${TDX_CLIENT_SECRET}`
            });
            const d = await res.json();
            return d.access_token;
        }

        // 抓取台鐵即時準點 (簡化示例)
        async function checkTrain() {
            try {
                const token = await getTDXToken();
                // 實際上這會呼叫 TDX 的 /v2/Rail/TRA/RestApi/LiveBoard/Station/
                // 並過濾出你的車次 411 與 168
                console.log("已連通 TDX，準備監控火車...");
            } catch (e) {
                console.log("TDX 授權中...");
            }
        }

        checkTrain();
    </script>
</body>
</html>
