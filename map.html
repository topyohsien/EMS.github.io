<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安平釣點地圖工具</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); overflow: hidden; }
        #map { height: 100%; width: 100%; }
        .instruction {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(23, 42, 69, 0.9);
            color: var(--highlight); padding: 8px 20px; border-radius: 25px;
            border: 1px solid var(--highlight); font-size: 14px; pointer-events: none;
        }
        .leaflet-popup-content-wrapper { background: var(--card); color: var(--text); border-radius: 12px; border: 1px solid #233554; }
        .leaflet-popup-tip { background: var(--card); }
        .info-title { color: #ff4444; font-weight: bold; border-bottom: 1px solid #233554; margin-bottom: 8px; font-size: 1.1rem; }
        .info-row { margin: 8px 0; font-size: 14px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="instruction">📍 長按地圖任意點查看海象資訊</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';

        // 初始化中心點在安平南堤附近
        const map = L.map('map', { center: [22.991, 120.146], zoom: 14, zoomControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 支援手機長按 (contextmenu)
        map.on('contextmenu', function(e) {
            const { lat, lng } = e.latlng;
            fetchData(lat.toFixed(5), lng.toFixed(5), e.latlng);
        });

        async function fetchData(lat, lng, latlng) {
            const popupHtml = `
                <div class="info-title">GPS: ${lat}, ${lng}</div>
                <div id="sun-box" class="info-row">🌅 日出日落讀取中...</div>
                <div id="tide-box" class="info-row">🌊 潮汐預報讀取中...</div>
            `;

            const popup = L.popup().setLatLng(latlng).setContent(popupHtml).openOn(map);

            // 1. 抓取日出日落 (依經緯度)
            try {
                const sunRes = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
                const sunData = await sunRes.json();
                const sunrise = new Date(sunData.results.sunrise).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'});
                const sunset = new Date(sunData.results.sunset).toLocaleTimeString('zh-TW', {hour: '2-digit', minute:'2-digit'});
                document.getElementById('sun-box').innerHTML = `🌅 日出 <b>${sunrise}</b> | 日落 <b>${sunset}</b>`;
            } catch (e) { document.getElementById('sun-box').innerText = "❌ 日出讀取失敗"; }

            // 2. 抓取潮汐 (依臺南市測站)
            try {
                const tideUrl = `https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}&locationName=${encodeURIComponent('臺南市')}`;
                const res = await fetch(tideUrl);
                const data = await res.json();
                
                // 解析結構：Location -> Station (安平站通常在第一筆)
                const station = data.records.Location[0].Station;
                const now = new Date();
                
                // 找出最接近現在的下一次潮汐事件
                const nextTide = station.TideForecast.TimePeriods.find(t => new Date(t.DateTime) > now);

                if (nextTide) {
                    const tTime = nextTide.DateTime.split('T')[1].substring(0, 5);
                    const tType = nextTide.TideType;
                    const tHeight = nextTide.TideHeight || '--';
                    document.getElementById('tide-box').innerHTML = `🌊 下次 <b>${tType}</b>：${tTime} (${tHeight}cm)`;
                } else {
                    document.getElementById('tide-box').innerText = "⚠️ 暫無預報資料";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('tide-box').innerText = "❌ 潮汐解析失敗 (請檢查Key權限)";
            }
        }
    </script>
</body>
</html>
