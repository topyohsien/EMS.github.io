<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平詳細海象預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 20px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border-bottom: 1px solid #233554; text-align: center; font-size: 14px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="loc-name" class="highlight">📍 正在連線安平測站...</div>
        <div style="margin-top:10px;">咬況預估：<span id="bite-status" class="highlight">--</span></div>
    </div>
    <div class="card">
        <canvas id="tideChart"></canvas>
    </div>
    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>類型</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const today = new Date().toISOString().split('T')[0];

        async function init() {
            try {
                const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await res.json();
                const anping = data.records.Location.find(l => l.LocationName.includes("臺南")).Station.find(s => s.StationName.includes("安平"));
                const dailyData = anping.TideForecast.TimePeriods.filter(t => t.DateTime.startsWith(today));

                const heights = dailyData.map(d => parseInt(d.TideHeight));
                const tideDiff = Math.max(...heights) - Math.min(...heights);
                document.getElementById('loc-name').innerText = `📍 安平港區 (今日潮差: ${tideDiff}cm)`;
                document.getElementById('bite-status').innerText = tideDiff > 100 ? "🔥 爆咬大潮" : "🎣 穩定小潮";

                render(dailyData);
            } catch (e) {
                document.getElementById('tide-table').innerHTML = '<tr><td colspan="3">❌ 資料讀取失敗</td></tr>';
            }
        }

        function render(list) {
            const labels = list.map(d => d.DateTime.split('T')[1].substring(0, 5));
            const data = list.map(d => d.TideHeight);

            new Chart(document.getElementById('tideChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ label: '潮高', data: data, borderColor: '#64ffda', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } } }
            });

            document.getElementById('tide-table').innerHTML = list.map(d => `
                <tr>
                    <td>${d.DateTime.split('T')[1].substring(0, 5)}</td>
                    <td>${d.TideHeight} cm</td>
                    <td>${d.TideType}</td>
                </tr>
            `).join('');
        }
        init();
    </script>
</body>
</html>
