<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平路亞詳細預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 20px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.1); color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>
    <div style="margin-bottom:15px;"><a href="map.html" style="color:var(--highlight); text-decoration:none; font-weight:bold;">← 返回地圖</a></div>
    <div class="card">
        <div id="loc-name" class="highlight" style="font-size:1.1rem;">📍 資料同步中...</div>
        <div id="bite-status" style="margin-top:10px;">咬況預估：分析中...</div>
    </div>
    <div class="card"><canvas id="tideChart" height="150"></canvas></div>
    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>預測</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const today = new Date().toISOString().split('T')[0];

        async function init() {
            try {
                const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await res.json();
                
                // 深度解析邏輯
                const locs = data.records.Location;
                const anping = locs.find(l => l.LocationName.includes("臺南")).Station.find(s => s.StationName.includes("安平"));
                const dailyData = anping.TideForecast.TimePeriods.filter(t => t.DateTime.startsWith(today));

                const heights = dailyData.map(d => parseInt(d.TideHeight));
                const tideDiff = Math.max(...heights) - Math.min(...heights);
                document.getElementById('loc-name').innerText = `📍 安平港區 (今日潮差: ${tideDiff}cm)`;
                document.getElementById('bite-status').innerHTML = `咬況預估：<span class="highlight">${tideDiff > 100 ? "🔥 爆咬大潮" : "🎣 穩定小潮"}</span>`;

                render(dailyData);
            } catch (e) {
                document.getElementById('tide-table').innerHTML = '<tr><td colspan="3">❌ API 資料讀取失敗</td></tr>';
            }
        }

        function render(list) {
            const labels = list.map(d => d.DateTime.split('T')[1].substring(0, 5));
            const dataValues = list.map(d => d.TideHeight);

            new Chart(document.getElementById('tideChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{ data: dataValues, borderColor: '#64ffda', tension: 0.4, fill: true, backgroundColor: 'rgba(100, 255, 218, 0.1)' }]
                },
                options: { plugins: { legend: { display: false } }, scales: { y: { display: false } } }
            });

            document.getElementById('tide-table').innerHTML = list.map(d => {
                const time = d.DateTime.split('T')[1].substring(0, 5);
                const isGolden = time.startsWith("05") || time.startsWith("17");
                return `<tr class="${isGolden ? 'hot' : ''}"><td>${time}</td><td>${d.TideHeight}cm</td><td>${d.TideType}</td></tr>`;
            }).join('');
        }
        init();
    </script>
</body>
</html>
