<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平海象與咬況預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 20px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; font-weight: bold; }
        canvas { max-height: 200px; }
    </style>
</head>
<body>
    <div style="margin-bottom:15px;"><a href="#" style="color:var(--highlight); text-decoration:none; font-weight:bold;">← 返回地圖</a></div>
    
    <div class="card">
        <div id="status-title" class="highlight" style="font-size:1.1rem;">📍 數據載入中...</div>
        <div id="bite-hint" style="margin-top:10px; font-size:0.9rem;">咬況預估：<span class="highlight">正在計算流速...</span></div>
    </div>

    <div class="card">
        <canvas id="tideChart"></canvas>
    </div>

    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>類型</th><th>路亞熱點</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const today = new Date().toISOString().split('T')[0];

        async function fetchTide() {
            try {
                const response = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await response.json();
                
                // 1. 導覽至正確的資料層級
                const locations = data.records.tideForecasts.location;
                // 優先搜尋名稱包含 "安平" 的測站
                const anping = locations.find(l => l.stationName.includes("安平") || l.locationName.includes("臺南"));

                if (!anping) throw new Error("找不到安平站資料");

                // 2. 篩選今日的潮汐週期
                const allPeriods = anping.tideForecast.tidePeriod;
                const daily = allPeriods.filter(p => p.tideTime.startsWith(today));

                // 3. 計算今日最大潮差
                const heights = daily.map(d => parseInt(d.tideHeight));
                const maxH = Math.max(...heights);
                const minH = Math.min(...heights);
                const diff = maxH - minH;

                // 更新標題與咬況建議
                document.getElementById('status-title').innerText = `📍 ${anping.stationName} (今日潮差: ${diff}cm)`;
                
                let advice = "";
                if (diff > 100) {
                    advice = "咬況預估：<span class='highlight'>🔥 大潮活躍 (適合 Jigging/青物)</span>";
                } else if (diff > 50) {
                    advice = "咬況預估：<span class='highlight'>🎣 中潮平穩 (路亞泛用)</span>";
                } else {
                    advice = "咬況預估：<span>💤 小潮緩流 (適合底棲魚種)</span>";
                }
                document.getElementById('bite-hint').innerHTML = advice;

                render(daily);
            } catch (err) {
                console.error(err);
                document.getElementById('tide-table').innerHTML = `<tr><td colspan="4" style="color:#ff6b6b;">❌ API 載入失敗<br>${err.message}</td></tr>`;
            }
        }

        function render(list) {
            // 處理時間格式，僅顯示 HH:mm
            const labels = list.map(d => d.tideTime.split(' ')[1].substring(0, 5));
            const heights = list.map(d => d.tideHeight);

            // 繪製圖表
            new Chart(document.getElementById('tideChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '潮位(cm)',
                        data: heights,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        pointBackgroundColor: '#64ffda'
                    }]
                },
                options: { 
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { 
                            grid: { color: '#233554' },
                            ticks: { color: '#8892b0' }
                        }, 
                        x: { 
                            grid: { display: false },
                            ticks: { color: '#8892b0' } 
                        } 
                    }
                }
            });

            // 填充表格
            document.getElementById('tide-table').innerHTML = list.map(d => {
                const timeStr = d.tideTime.split(' ')[1].substring(0, 5);
                const hour = parseInt(timeStr.split(':')[0]);
                // 定義母光 (5-7點) 與 黃昏 (17-19點)
                const isGolden = (hour >= 5 && hour <= 7) || (hour >= 17 && hour <= 19);
                
                return `
                    <tr class="${isGolden ? 'hot' : ''}">
                        <td>${timeStr}</td>
                        <td>${d.tideHeight}cm</td>
                        <td>${d.tideType}</td>
                        <td>${isGolden ? '🔥 黃金時段' : '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        // 啟動程式
        fetchTide();
    </script>
</body>
</html>
