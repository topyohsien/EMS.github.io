<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安平海象與咬況預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 20px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>
    <div style="margin-bottom:15px;"><a href="map.html" style="color:var(--highlight); text-decoration:none; font-weight:bold;">← 返回地圖</a></div>
    
    <div class="card">
        <div id="status-title" class="highlight" style="font-size:1.1rem;">📍 安平測站數據載入中...</div>
        <div id="bite-hint" style="margin-top:10px; font-size:0.9rem;">咬況預估：<span class="highlight">正在計算流速...</span></div>
    </div>

    <div class="card">
        <canvas id="tideChart" height="180"></canvas>
    </div>

    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>類型</th><th>路亞熱點</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <script>
        async function fetchTide() {
    try {
        const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
        const data = await res.json();
        
        // 1. 找到安平測站 (氣象署結構為 tideForecasts.location)
        const locations = data.records.tideForecasts.location;
        const anping = locations.find(l => l.locationName.includes("臺南") || l.stationName.includes("安平"));

        if (!anping) throw new Error("找不到安平測站數據");

        // 2. 取得今日資料 (注意欄位是 tideTime)
        const allPeriods = anping.tideForecast.tidePeriod;
        const daily = allPeriods.filter(p => p.tideTime.startsWith(today));

        // 3. 計算潮差
        const heights = daily.map(d => parseInt(d.tideHeight));
        const maxH = Math.max(...heights);
        const minH = Math.min(...heights);
        const diff = maxH - minH;

        // 更新 UI
        document.getElementById('status-title').innerText = `📍 安平港 (今日潮差: ${diff}cm)`;
        document.getElementById('bite-hint').innerHTML = diff > 100 
            ? "咬況預估：<span class='highlight'>🔥 大潮活躍 (適合路亞/青物)</span>" 
            : "咬況預估：<span>🎣 穩定小潮 (適合底棲)</span>";

        render(daily);
    } catch (err) {
        console.error("錯誤詳情:", err);
        document.getElementById('tide-table').innerHTML = '<tr><td colspan="4">❌ API 讀取失敗，請檢查網路或金鑰</td></tr>';
    }
}

    </script>
</body>
</html>
