<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路亞岸拋終極預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .back-btn { color: var(--highlight); text-decoration: none; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .controls { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #233554; }
        .loc-info { font-size: 1.1rem; margin-bottom: 5px; color: #ff6b6b; font-weight: bold; }
        input[type="date"] { 
            width: 100%; padding: 10px; border-radius: 8px; background: #233554; 
            color: var(--highlight); border: 1px solid var(--highlight); font-size: 1rem; box-sizing: border-box; margin-top: 10px;
        }

        /* 路亞資訊儀表板 */
        .lure-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; font-size: 0.9rem; }
        .stat-box { background: rgba(100, 255, 218, 0.05); padding: 8px; border-radius: 6px; border: 1px solid #233554; }
        .stat-label { color: #8892b0; display: block; font-size: 0.75rem; }
        .stat-val { color: var(--highlight); font-weight: bold; }

        .chart-container { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #233554; }
        .fish-icons { font-size: 1.3rem; color: var(--highlight); margin-bottom: 5px; text-align: right; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; margin-top: 10px; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #233554; font-size: 13px; }
        th { background: #1d3557; color: var(--highlight); }
        .hot-time { background: rgba(255, 107, 107, 0.1); color: #ff6b6b; font-weight: bold; }
    </style>
</head>
<body>
    <a href="map.html" class="back-btn">← 返回地圖</a>
    
    <div class="controls">
        <div id="location-name" class="loc-info">📍 定位讀取中...</div>
        <input type="date" id="date-picker">
        
        <div class="lure-stats">
            <div class="stat-box"><span class="stat-label">母光時刻</span><span id="sunrise-val" class="stat-val">--:--</span></div>
            <div class="stat-box"><span class="stat-label">黃昏時刻</span><span id="sunset-val" class="stat-val">--:--</span></div>
            <div class="stat-box"><span class="stat-label">當日潮差</span><span id="tide-diff" class="stat-val">--</span> cm</div>
            <div class="stat-box"><span class="stat-label">流速預估</span><span id="current-speed" class="stat-val">--</span></div>
        </div>
    </div>

    <div class="chart-container">
        <div class="fish-icons" id="fish-rank">🐟🐟🐟</div>
        <div style="font-size:0.9rem; margin-bottom:10px;">🎣 路亞活躍時段預測 (Baitfish 動向)</div>
        <canvas id="lureChart"></canvas>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th>時間</th>
                <th>潮位</th>
                <th>路亞活躍度</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <tr><td colspan="3">⏳ 正在計算魚訊演算...</td></tr>
        </tbody>
    </table>

    <script>
        // 自動從您測試成功的資訊中抓取金鑰
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A'; 
        const urlParams = new URLSearchParams(window.location.search);
        const lat = urlParams.get('lat') || '22.98';
        const lng = urlParams.get('lng') || '120.14';
        const datePicker = document.getElementById('date-picker');
        let myChart = null;

        datePicker.value = new Date().toISOString().split('T')[0];

        async function fetchLureData() {
            try {
                // 1. 抓取潮汐 (F-A0021-001)
                const tRes = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const tData = await tRes.json();
                const station = tData.records.Location.find(l => l.LocationName === "臺南市").Station[0];
                const dailyTide = station.TideForecast.TimePeriods.filter(t => t.DateTime.startsWith(datePicker.value));

                // 2. 模擬氣象數據 (降雨、溫度、黃昏母光)
                // 註：實際環境建議串接 O-A0003-001 取得即時雨量
                const sunrise = "05:36"; // 參考截圖
                const sunset = "18:21";
                document.getElementById('sunrise-val').innerText = sunrise;
                document.getElementById('sunset-val').innerText = sunset;
                document.getElementById('location-name').innerText = `📍 安平區域 (${lat}, ${lng})`;

                // 3. 計算潮差與流速
                const heights = dailyTide.map(d => parseInt(d.TideHeight));
                const diff = Math.max(...heights) - Math.min(...heights);
                document.getElementById('tide-diff').innerText = diff;
                document.getElementById('current-speed').innerText = diff > 90 ? "強流 (大補)" : "緩流 (一般)";

                renderChartAndTable(dailyTide, sunrise, sunset, diff);
            } catch (e) {
                document.getElementById('data-table').innerHTML = '<tr><td colspan="3">⚠️ 資料載入失敗，請確認 API 訂閱狀態</td></tr>';
            }
        }

        function renderChartAndTable(dailyTide, sunrise, sunset, tideDiff) {
            const labels = dailyTide.map(d => d.DateTime.split('T')[1].substring(0, 5));
            const scores = dailyTide.map(d => {
                let s = 40; // 基礎底分
                const t = d.DateTime.split('T')[1].substring(0, 5);
                
                // 滿/乾潮前後 2 小時加分 (流水發動)
                s += 30; 
                // 母光/黃昏關鍵加分 (餌魚最活躍)
                if (Math.abs(parseInt(t) - parseInt(sunrise)) <= 1 || Math.abs(parseInt(t) - parseInt(sunset)) <= 1) s += 30;
                // 大潮加分
                if (tideDiff > 100) s += 10;
                
                return s;
            });

            // 繪製路亞活躍曲線
            const ctx = document.getElementById('lureChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: scores,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.1)',
                        tension: 0.4, // 平滑曲線
                        fill: true,
                        pointBackgroundColor: scores.map(s => s > 85 ? '#ff6b6b' : '#64ffda'),
                        pointRadius: 5
                    }]
                },
                options: {
                    scales: { y: { display: false }, x: { ticks: { color: '#8892b0' } } },
                    plugins: { legend: { display: false } }
                }
            });

            // 更新表格內容
            document.getElementById('data-table').innerHTML = dailyTide.map((t, i) => `
                <tr class="${scores[i] > 85 ? 'hot-time' : ''}">
                    <td>${labels[i]}</td>
                    <td>${t.TideType} (${t.TideHeight}cm)</td>
                    <td>${scores[i] > 85 ? '🔥 爆咬預警' : '🎣 一般穩定'}</td>
                </tr>
            `).join('');
            
            document.getElementById('fish-rank').innerText = tideDiff > 100 ? '🐟🐟🐟' : '🐟🐟';
        }

        datePicker.addEventListener('change', fetchLureData);
        fetchLureData();
    </script>
</body>
</html>
