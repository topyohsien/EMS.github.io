<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海象詳情 - 日期切換版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 15px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-link { color: var(--highlight); text-decoration: none; font-weight: bold; }
        
        /* 日期選擇器樣式 */
        .date-picker-container { display: flex; align-items: center; gap: 10px; background: #1d3557; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--highlight); }
        #date-select { background: transparent; color: var(--highlight); border: none; font-size: 1rem; font-weight: bold; cursor: pointer; outline: none; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; font-weight: bold; }
        canvas { max-height: 200px; width: 100% !important; }
    </style>
</head>
