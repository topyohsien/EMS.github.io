<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海象詳情 - 結構自動導向版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 15px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-link { color: var(--highlight); text-decoration: none; font-weight: bold; border: 1px solid var(--highlight); padding: 5px 10px; border-radius: 6px; }
        .date-picker-container { background: #1d3557; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--highlight); }
        #date-select { background: transparent; color: var(--highlight); border: none; font-size: 16px; font-weight: bold; outline: none; color-scheme: dark; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; font-weight: bold; }
        canvas { max-height: 220px; width: 100% !important; }
        .note-card { font-size: 12px; color: #8892b0; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-link">← 返回地圖</a>
        <div class="date-picker-container">
            <input type="date" id="date-select">
        </div>
    </div>
    
    <div class="card">
        <div id="status-title" class="highlight" style="font-size:1.1rem;">📍 結構掃描中...</div>
        <div id="bite-hint" style="margin-top:10px; font-size:0.9rem;">正在抓取最新 API 結構與日期範圍...</div>
    </div>

    <div class="card"><canvas id="tideChart"></canvas></div>

    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>類型</th><th>路亞熱點</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <div class="card note-card">
        <div class="highlight" style="margin-bottom: 5px;">💡 備註：路亞熱點判斷邏輯</div>
        1. **黃金時段**：晨昏變換活性最高時段（05-07, 17-19）。<br>
        2. **乾滿潮交替**：潮位轉換帶動流速變化。
    </div>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const dateInput = document.getElementById('date-select');
        const params = new URLSearchParams(window.location.search);
        const uLat = parseFloat(params.get('lat'));
        const uLng = parseFloat(params.get('lng'));

        let allStations = [];
        let apiDateRange = { min: "", max: "" };

        // 通用掃描函數：找出物件中包含關鍵字的陣列
        function findArray(obj, key) {
            if (!obj || typeof obj !== 'object') return null;
            if (Array.isArray(obj)) {
                for (let i of obj) {
                    let found = findArray(i, key);
                    if (found) return found;
                }
            } else {
                if (obj[key] && Array.isArray(obj[key])) return obj[key];
                for (let k in obj) {
                    let found = findArray(obj[k], key);
                    if (found) return found;
                }
            }
            return null;
        }

        async function init() {
            try {
                // 1. 抓取 API
                const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await res.json();
                
                // 2. 自動偵測測站陣列路徑 (TideForecasts)
                allStations = findArray(data, 'TideForecasts') || findArray(data, 'Location');
                if (!allStations) throw new Error("找不到測站資料");

                // 3. 從 API 資料中「提取」日期範圍，而非使用系統時間
                const firstStationDaily = findArray(allStations[0], 'Daily') || findArray(allStations[0], 'TimePeriods');
                apiDateRange.min = firstStationDaily[0].Date || firstStationDaily[0].date;
                apiDateRange.max = firstStationDaily[firstStationDaily.length - 1].Date || firstStationDaily[firstStationDaily.length - 1].date;

                // 4. 設定日期選擇器，並預設為 API 提供的第一天
                dateInput.min = apiDateRange.min;
                dateInput.max = apiDateRange.max;
                dateInput.value = apiDateRange.min; 

                updateUI();
            } catch (err) {
                document.getElementById('status-title').innerText = "❌ 結構掃描失敗";
                console.error(err);
            }
        }

        function updateUI() {
            const selectedDate = dateInput.value;
            let target = null;

            // 測站匹配 (座標比對)
            if (!isNaN(uLat) && !isNaN(uLng)) {
                let min = Infinity;
                allStations.forEach(s => {
                    const loc = s.Location || s;
                    const dist = Math.sqrt(Math.pow((loc.Latitude||loc.latitude)-uLat, 2) + Math.pow((loc.Longitude||loc.longitude)-uLng, 2));
                    if (dist < min) { min = dist; target = s; }
                });
            } else {
                target = allStations.find(s => JSON.stringify(s).includes("安平"));
            }

            try {
                const locObj = target.Location || target;
                const dailyArr = findArray(locObj, 'Daily') || findArray(locObj, 'TimePeriods');
                const dayData = dailyArr.find(d => (d.Date || d.date) === selectedDate);
                
                if (!dayData) throw new Error("此日期無預報");

                const timePoints = dayData.Time || dayData.time;
                const heights = timePoints.map(t => parseInt(t.TideHeights?.AboveChartDatum ?? t.height ?? 0));
                const range = Math.max(...heights) - Math.min(...heights);

                document.getElementById('status-title').innerText = `📍 ${locObj.LocationName || locObj.stationName} (${dayData.TideRange || '一般'}潮)`;
                document.getElementById('bite-hint').innerHTML = `潮差: ${range}cm | 咬況: <span class="highlight">${range > 100 ? '🔥 大潮活躍' : '🎣 穩定小潮'}</span>`;

                renderChart(timePoints, heights);
                renderTable(timePoints);
            } catch (err) {
                document.getElementById('status-title').innerText = `🚫 錯誤: ${err.message}`;
            }
        }

        function renderChart(list, hArr) {
            const labels = list.map(d => (d.DateTime || d.dateTime || d.time).split('T')[1].substring(0, 5));
            const ctx = document.getElementById('tideChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: hArr,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#233554' }, ticks: { color: '#8892b0' } },
                        x: { ticks: { color: '#8892b0' } }
                    }
                }
            });
        }

        function renderTable(list) {
            document.getElementById('tide-table').innerHTML = list.map(d => {
                const time = (d.DateTime || d.dateTime || d.time).split('T')[1].substring(0, 5);
                const h = d.TideHeights?.AboveChartDatum ?? d.height ?? 0;
                const hour = parseInt(time.split(':')[0]);
                const isGolden = (hour >= 5 && hour <= 7) || (hour >= 17 && hour <= 19);
                return `<tr class="${isGolden ? 'hot' : ''}">
                    <td>${time}</td>
                    <td>${h}cm</td>
                    <td>${d.Tide || d.tide || "一般"}</td>
                    <td>${isGolden ? '🔥 黃金時段' : '-'}</td>
                </tr>`;
            }).join('');
        }

        dateInput.addEventListener('change', updateUI);
        init();
    </script>
</body>
</html>
