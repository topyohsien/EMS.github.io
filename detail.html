<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>詳細釣魚海象預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .back-btn { color: var(--highlight); text-decoration: none; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        
        /* 頂部狀態欄：修復定位顯示 */
        .controls { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #233554; }
        .loc-info { font-size: 1.1rem; margin-bottom: 10px; color: #ff6b6b; font-weight: bold; }
        input[type="date"] { 
            width: 100%; padding: 10px; border-radius: 8px; background: #233554; 
            color: var(--highlight); border: 1px solid var(--highlight); font-size: 1rem; box-sizing: border-box;
        }

        /* 魚訊圖表區塊 */
        .chart-container { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #233554; position: relative; }
        .fish-icons { font-size: 1.5rem; text-align: right; color: var(--highlight); margin-bottom: 5px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #233554; font-size: 14px; }
        th { background: #1d3557; color: var(--highlight); }
        .tide-high { color: #ff6b6b; font-weight: bold; }
        .tide-low { color: #4dabf7; font-weight: bold; }
    </style>
</head>
<body>
    <a href="map.html" class="back-btn">← 返回地圖</a>
    
    <div class="controls">
        <div id="location-name" class="loc-info">📍 正在讀取坐標...</div>
        <input type="date" id="date-picker">
    </div>

    <div class="chart-container">
        <div class="fish-icons" id="fish-rank">🐟🐟🐟</div>
        <canvas id="tideChart"></canvas>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th>時間</th>
                <th>潮汐</th>
                <th>潮高(cm)</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <tr><td colspan="3">⏳ 正在連線氣象署...</td></tr>
        </tbody>
    </table>

    <script>
        // 1. 請確保此 Key 已開通 F-A0021-001 權限
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A'; 
        
        // 2. 解析網址參數 (修復定位不到的問題)
        const urlParams = new URLSearchParams(window.location.search);
        const lat = urlParams.get('lat');
        const lng = urlParams.get('lng');
        const datePicker = document.getElementById('date-picker');
        let myChart = null;

        // 預設日期設為今天
        const today = new Date().toISOString().split('T')[0];
        datePicker.value = today;

        // 檢查座標是否存在
        if (lat && lng) {
            document.getElementById('location-name').innerText = `📍 坐標: ${lat}, ${lng}`;
            updatePage();
        } else {
            document.getElementById('location-name').innerText = "❌ 找不到座標，請從地圖長按進入";
        }

        async function updatePage() {
            const selectedDate = datePicker.value;
            const tableBody = document.getElementById('data-table');
            tableBody.innerHTML = '<tr><td colspan="3">⏳ 正在載入資料...</td></tr>';
            
            try {
                // 抓取未來 1 個月潮汐資料
                const response = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const data = await response.json();
                
                // 找出該地區資料 (預設顯示臺南市安平，可根據 lat/lng 擴展判斷邏輯)
                const tainan = data.records.Location.find(l => l.LocationName === "臺南市");
                const station = tainan.Station.find(s => s.StationName === "安平") || tainan.Station[0];
                
                // 過濾出所選日期的時間段資料
                const dailyData = station.TideForecast.TimePeriods.filter(t => t.DateTime.startsWith(selectedDate));

                if (dailyData.length > 0) {
                    // 更新表格內容
                    tableBody.innerHTML = dailyData.map(t => `
                        <tr>
                            <td>${t.DateTime.split('T')[1].substring(0, 5)}</td>
                            <td class="${t.TideType.includes('滿') ? 'tide-high' : 'tide-low'}">${t.TideType}</td>
                            <td>${t.TideHeight}</td>
                        </tr>
                    `).join('');

                    // 繪製魚訊曲線
                    drawChart(dailyData);
                    
                    // 計算潮差來給予魚訊等級 (潮差大 = 魚訊旺)
                    const heights = dailyData.map(d => parseInt(d.TideHeight));
                    const diff = Math.max(...heights) - Math.min(...heights);
                    document.getElementById('fish-rank').innerText = diff > 80 ? '🐟🐟🐟' : '🐟🐟';
                } else {
                    tableBody.innerHTML = '<tr><td colspan="3">❌ 該日期無預報(僅限一個月內)</td></tr>';
                }
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="3" style="color:#ffbb33">⚠️ 讀取失敗，請檢查 API Key 權限</td></tr>';
            }
        }

        // 繪圖函式：模仿截圖中的波浪線條
        function drawChart(dailyData) {
            const ctx = document.getElementById('tideChart').getContext('2d');
            const labels = dailyData.map(d => d.DateTime.split('T')[1].substring(0, 5));
            const dataValues = dailyData.map(d => d.TideHeight);

            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.15)',
                        borderWidth: 3,
                        tension: 0.4, // 關鍵：讓線條平滑呈波浪狀
                        fill: true,
                        pointBackgroundColor: '#ff6b6b',
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: true, grid: { color: '#233554' }, ticks: { color: '#8892b0' } },
                        x: { ticks: { color: '#8892b0' } }
                    }
                }
            });
        }

        datePicker.addEventListener('change', updatePage);
    </script>
</body>
</html>
