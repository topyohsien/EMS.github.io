<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路亞岸拋詳細預報</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .back-btn { color: var(--highlight); text-decoration: none; display: inline-block; margin-bottom: 15px; font-weight: bold; }
        .controls { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #233554; }
        .loc-info { font-size: 1.1rem; margin-bottom: 10px; color: #ff6b6b; font-weight: bold; }
        input[type="date"] { 
            width: 100%; padding: 10px; border-radius: 8px; background: #233554; 
            color: var(--highlight); border: 1px solid var(--highlight); font-size: 1rem; box-sizing: border-box;
        }

        /* 魚訊儀表板 */
        .chart-container { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #233554; }
        .lure-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 0.85rem; color: #8892b0; }
        .lure-val { color: var(--highlight); font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #233554; font-size: 13px; }
        th { background: #1d3557; color: var(--highlight); }
        .best-time { background: rgba(100, 255, 218, 0.1); color: var(--highlight); font-weight: bold; }
    </style>
</head>
<body>
    <a href="map.html" class="back-btn">← 返回地圖</a>
    
    <div class="controls">
        <div id="location-name" class="loc-info">📍 正在讀取坐標...</div>
        <input type="date" id="date-picker">
        
        <div class="lure-info">
            <div>今日潮差：<span id="tide-diff" class="lure-val">--</span> cm</div>
            <div>流速預估：<span id="current-speed" class="lure-val">--</span></div>
            <div>母光時間：<span id="sunrise-val" class="lure-val">--</span></div>
            <div>黃昏時刻：<span id="sunset-val" class="lure-val">--</span></div>
        </div>
    </div>

    <div class="chart-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <span>🎣 路亞活躍活躍預測</span>
            <span id="fish-rank" style="font-size:1.2rem;">🐟🐟🐟</span>
        </div>
        <canvas id="lureChart"></canvas>
        <div style="font-size:0.75rem; color:#8892b0; margin-top:10px; text-align:center;">
            *曲線越高代表餌魚受流帶動越明顯，青物進場機率越高
        </div>
    </div>

    <table id="main-table">
        <thead>
            <tr>
                <th>時間</th>
                <th>潮汐狀態</th>
                <th>活躍度</th>
            </tr>
        </thead>
        <tbody id="data-table">
            <tr><td colspan="3">⏳ 正在連線氣象署...</td></tr>
        </tbody>
    </table>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A'; 
        const urlParams = new URLSearchParams(window.location.search);
        const lat = urlParams.get('lat');
        const lng = urlParams.get('lng');
        const datePicker = document.getElementById('date-picker');
        let myChart = null;

        datePicker.value = new Date().toISOString().split('T')[0];

        if (lat && lng) {
            document.getElementById('location-name').innerText = `📍 安平釣區 (${lat}, ${lng})`;
            updatePage();
        } else {
            document.getElementById('location-name').innerText = "❌ 座標錯誤";
        }

        async function updatePage() {
            try {
                // 1. 抓取潮汐資料 (F-A0021-001)
                const tideRes = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const tideData = await tideRes.json();
                const station = tideData.records.Location.find(l => l.LocationName === "臺南市").Station.find(s => s.StationName === "安平");
                const dailyTide = station.TideForecast.TimePeriods.filter(t => t.DateTime.startsWith(datePicker.value));

                // 2. 抓取日出日落 (模擬路亞黃金母光時刻)
                const sunRes = await fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lng}&formatted=0`);
                const sunData = await sunRes.json();
                const sunrise = new Date(sunData.results.sunrise).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
                const sunset = new Date(sunData.results.sunset).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});

                document.getElementById('sunrise-val').innerText = sunrise;
                document.getElementById('sunset-val').innerText = sunset;

                // 3. 邏輯計算：路亞路徑與活躍度
                const heights = dailyTide.map(d => parseInt(d.TideHeight));
                const diff = Math.max(...heights) - Math.min(...heights);
                document.getElementById('tide-diff').innerText = diff;
                
                // 判斷流速 (大潮 = 強流)
                document.getElementById('current-speed').innerText = diff > 100 ? "極快 (爆發)" : (diff > 60 ? "穩定 (佳)" : "緩慢 (悶)");

                renderLureContent(dailyTide, sunrise, sunset);
            } catch (error) {
                document.getElementById('data-table').innerHTML = '<tr><td colspan="3">API 權限不足，請檢查訂閱</td></tr>';
            }
        }

        function renderLureContent(dailyTide, sunrise, sunset) {
            const labels = dailyTide.map(d => d.DateTime.split('T')[1].substring(0, 5));
            const activityData = dailyTide.map((d, i) => {
                let score = 50; // 基礎分
                const time = d.DateTime.split('T')[1].substring(0, 5);
                
                // 滿乾潮前後是路亞黃金期 (流水發動)
                score += 30; 
                
                // 母光/黃昏加成 (路亞關鍵期)
                if (time.startsWith(sunrise.substring(0,2)) || time.startsWith(sunset.substring(0,2))) score += 20;
                
                return score;
            });

            // 繪製曲線
            const ctx = document.getElementById('lureChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '路亞活躍度',
                        data: activityData,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.2)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 6,
                        pointBackgroundColor: (context) => context.raw > 80 ? '#ff6b6b' : '#64ffda'
                    }]
                },
                options: {
                    scales: { y: { display: false }, x: { ticks: { color: '#8892b0' } } },
                    plugins: { legend: { display: false } }
                }
            });

            // 更新表格
            document.getElementById('data-table').innerHTML = dailyTide.map((t, i) => `
                <tr class="${activityData[i] > 80 ? 'best-time' : ''}">
                    <td>${labels[i]}</td>
                    <td>${t.TideType}</td>
                    <td>${activityData[i] > 80 ? '🔥 極佳' : '🎣 普通'}</td>
                </tr>
            `).join('');
        }

        datePicker.addEventListener('change', updatePage);
    </script>
</body>
</html>
