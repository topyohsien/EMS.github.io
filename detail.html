<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海象詳情 - 終極結構適應版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0a192f; --card: #172a45; --highlight: #64ffda; --text: #e6f1ff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #233554; margin-bottom: 15px; }
        .highlight { color: var(--highlight); font-weight: bold; }
        .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .back-link { color: var(--highlight); text-decoration: none; font-weight: bold; border: 1px solid var(--highlight); padding: 5px 10px; border-radius: 6px; font-size: 14px; }
        .date-picker-container { background: #1d3557; padding: 5px 10px; border-radius: 8px; border: 1px solid var(--highlight); }
        #date-select { background: transparent; color: var(--highlight); border: none; font-size: 16px; font-weight: bold; outline: none; color-scheme: dark; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 8px; border-bottom: 1px solid #233554; text-align: center; font-size: 13px; }
        th { color: var(--highlight); background: #1d3557; }
        .hot { background: rgba(255, 107, 107, 0.15); color: #ff6b6b; font-weight: bold; }
        canvas { max-height: 220px; width: 100% !important; }
        .note-card { font-size: 12px; color: #8892b0; line-height: 1.6; }
        #debug-log { font-size: 10px; color: #8892b0; margin-top: 10px; font-family: monospace; display: none; }
    </style>
</head>
<body>
    <div class="nav-header">
        <a href="index.html" class="back-link">← 返回地圖</a>
        <div class="date-picker-container">
            <input type="date" id="date-select">
        </div>
    </div>
    
    <div class="card">
        <div id="status-title" class="highlight" style="font-size:1.1rem;">🔍 正在讀取資料...</div>
        <div id="bite-hint" style="margin-top:10px; font-size:0.9rem;">咬況分析：計算中...</div>
        <div id="debug-log"></div>
    </div>

    <div class="card"><canvas id="tideChart"></canvas></div>

    <table>
        <thead><tr><th>時間</th><th>潮高</th><th>類型</th><th>路亞熱點</th></tr></thead>
        <tbody id="tide-table"></tbody>
    </table>

    <div class="card note-card">
        <div class="highlight" style="margin-bottom: 5px;">💡 備註：路亞熱點判斷邏輯</div>
        本系統之「路亞熱點」判斷基準為：<br>
        1. **黃金時段**：結合日出/日落前後的「晨昏變換」時段（清晨 05:00-07:00 與傍晚 17:00-19:00），此時掠食魚種活性最高。<br>
        2. **乾滿潮交替**：針對潮水起伏帶動的流速變化，標示出最佳拋投契機。<br>
        請釣友注意安全，預報僅供參考，實際咬況受水溫、風向及現場流速影響。
    </div>

    <script>
        const API_KEY = 'CWA-337BBD8F-DBC8-4D8D-A92F-DAA5B176120A';
        const dateInput = document.getElementById('date-select');
        const logEl = document.getElementById('debug-log');
        
        // 預設今天
        const todayStr = new Date().toLocaleDateString('sv-SE');
        dateInput.value = todayStr;

        const params = new URLSearchParams(window.location.search);
        const uLat = parseFloat(params.get('lat'));
        const uLng = parseFloat(params.get('lng'));

        let finalStationList = [];
        let dateRange = { min: "", max: "" };

        function findArrayByKey(obj, keyName) {
            if (obj && typeof obj === 'object') {
                if (Array.isArray(obj)) {
                    for (let item of obj) {
                        const found = findArrayByKey(item, keyName);
                        if (found) return found;
                    }
                } else {
                    if (obj.hasOwnProperty(keyName) && Array.isArray(obj[keyName])) return obj[keyName];
                    for (let k in obj) {
                        const found = findArrayByKey(obj[k], keyName);
                        if (found) return found;
                    }
                }
            }
            return null;
        }

        async function startDiagnosis() {
            try {
                const res = await fetch(`https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-A0021-001?Authorization=${API_KEY}`);
                const raw = await res.json();
                
                let stations = findArrayByKey(raw, 'TideForecasts') || findArrayByKey(raw, 'location') || findArrayByKey(raw, 'Location');
                if (!stations) throw new Error("無法定位測站陣列");
                
                finalStationList = stations;

                // 獲取 API 的日期範圍限制
                const firstStation = stations[0];
                const dailyArr = findArrayByKey(firstStation, 'Daily') || findArrayByKey(firstStation, 'TimePeriods');
                if (dailyArr && dailyArr.length > 0) {
                    dateRange.min = dailyArr[0].Date || dailyArr[0].date;
                    dateRange.max = dailyArr[dailyArr.length - 1].Date || dailyArr[dailyArr.length - 1].date;
                    dateInput.min = dateRange.min;
                    dateInput.max = dateRange.max;
                }
                
                updateView();
            } catch (err) {
                document.getElementById('status-title').innerHTML = `<span style="color:#ff6b6b;">❌ 讀取失敗: ${err.message}</span>`;
            }
        }

        function updateView() {
            if (!finalStationList.length) return;

            const selectedDate = dateInput.value;

            // 日期超限檢查
            if (selectedDate < dateRange.min || selectedDate > dateRange.max) {
                alert(`選擇日期超出預報範圍！\n目前可供查詢：${dateRange.min} 至 ${dateRange.max}`);
                dateInput.value = (selectedDate < dateRange.min) ? dateRange.min : dateRange.max;
                updateView(); // 修正日期後重新更新
                return;
            }

            let target = null;
            if (!isNaN(uLat) && !isNaN(uLng)) {
                let minDis = Infinity;
                finalStationList.forEach(item => {
                    const loc = item.Location || item;
                    const sLat = loc.Latitude || loc.latitude;
                    const sLng = loc.Longitude || loc.longitude;
                    const dis = Math.sqrt(Math.pow(sLat - uLat, 2) + Math.pow(sLng - uLng, 2));
                    if (dis < minDis) {
                        minDis = dis;
                        target = item;
                    }
                });
            } else {
                target = finalStationList.find(i => JSON.stringify(i).includes("安平"));
            }

            try {
                const locObj = target.Location || target;
                const dailyArr = findArrayByKey(locObj, 'Daily') || findArrayByKey(locObj, 'TimePeriods');
                const dayData = dailyArr.find(d => d.Date === selectedDate || d.date === selectedDate);
                
                if (!dayData) throw new Error("該日期無預報資料");

                const timePoints = dayData.Time || dayData.time;
                const heights = timePoints.map(t => {
                    const h = t.TideHeights?.AboveChartDatum ?? t.tideHeight ?? t.height;
                    return parseInt(h);
                });

                const diff = Math.max(...heights) - Math.min(...heights);
                const stationName = locObj.LocationName || locObj.stationName || "未知測站";

                document.getElementById('status-title').innerText = `📍 ${stationName} (${dayData.TideRange || '一般'}潮)`;
                document.getElementById('bite-hint').innerHTML = `潮差: ${diff}cm | 咬況: <span class="highlight">${diff > 100 ? '🔥 大潮活躍' : '🎣 穩定小潮'}</span>`;

                renderChart(timePoints, heights);
                renderTable(timePoints);
            } catch (err) {
                document.getElementById('status-title').innerText = `🚫 錯誤: ${err.message}`;
            }
        }

        function renderChart(list, heightData) {
            const labels = list.map(d => (d.DateTime || d.dateTime || d.time).split('T')[1].substring(0, 5));
            const ctx = document.getElementById('tideChart').getContext('2d');
            if (window.myChart) window.myChart.destroy();
            window.myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: heightData,
                        borderColor: '#64ffda',
                        backgroundColor: 'rgba(100, 255, 218, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#233554' }, ticks: { color: '#8892b0' } },
                        x: { ticks: { color: '#8892b0' } }
                    }
                }
            });
        }

        function renderTable(list) {
            document.getElementById('tide-table').innerHTML = list.map(d => {
                const time = (d.DateTime || d.dateTime || d.time).split('T')[1].substring(0, 5);
                const h = d.TideHeights?.AboveChartDatum ?? d.tideHeight ?? d.height;
                const type = d.Tide || d.tide || "一般";
                const hour = parseInt(time.split(':')[0]);
                const isGolden = (hour >= 5 && hour <= 7) || (hour >= 17 && hour <= 19);
                return `<tr class="${isGolden ? 'hot' : ''}">
                    <td>${time}</td>
                    <td>${h}cm</td>
                    <td>${type}</td>
                    <td>${isGolden ? '🔥 黃金時段' : '-'}</td>
                </tr>`;
            }).join('');
        }

        // 日期變動監聽器：選擇後立即更新
        dateInput.addEventListener('change', () => {
            updateView();
        });

        startDiagnosis();
    </script>
</body>
</html>
